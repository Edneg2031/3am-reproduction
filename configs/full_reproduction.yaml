project_root: /Users/lanjie/Proj/3dgs/3am
paths:
  data_raw: data/raw
  data_processed: data/processed
  checkpoints: outputs/checkpoints
  outputs: outputs

external:
  sam2_repo: external/sam2
  must3r_repo: external/must3r
  sam2_checkpoint_url: https://dl.fbaipublicfiles.com/segment_anything_2/092824/sam2.1_hiera_large.pt
  sam2_checkpoint: outputs/checkpoints/sam2.1_hiera_large.pt
  sam2_config: configs/sam2.1/sam2.1_hiera_l.yaml
  must3r_checkpoint_url: https://download.europe.naverlabs.com/ComputerVision/MUSt3R/MUSt3R_512.pth
  must3r_checkpoint: outputs/checkpoints/must3r.pt

datasets:
  scannetpp:
    root: data/raw/scannetpp
    processed: data/processed/scannetpp
    manifest: data/processed/scannetpp_manifest.json
    scenes: 855
    fov_sampling_probability: 0.8
  ase:
    root: data/raw/ase
    processed: data/processed/ase
    manifest: data/processed/ase_manifest.json
    scenes: 2612
    estimated_size: 23TB
    fov_sampling_probability: 0.8
  mose:
    root: data/raw/mose
    processed: data/processed/mose
    manifest: data/processed/mose_manifest.json
    videos: 1453
    fov_sampling_probability: 0.0
  replica:
    root: data/raw/replica
    processed: data/processed/replica
    split: eval

sampling:
  fov_threshold: 0.25
  sequence_length: 8

features:
  cache_root: outputs/must3r_features
  online: false
  image_size: 512
  amp: bf16
  max_bs: 1
  decode_batch_size: 1
  feature_layers: encoder,4,7,11

model:
  sam_image_size: 1024
  sam_channels: 256
  must3r_channels: [1024, 768, 768, 768]
  hidden_channels: 256
  attention_heads: 8

training:
  iterations: 1000000
  batch_size: 1
  optimizer: AdamW
  learning_rates:
    memory_attention: 5.0e-6
    mask_decoder: 5.0e-6
    feature_merger: 1.0e-5
  memory_frames: 8
  log_every: 50
  checkpoint_every: 5000
  save_model_every: 5000
  auto_resume: false
  model_out: outputs/checkpoints/3am_model.pt
  visualize_every: 0
  visualization_dir: outputs/visualizations/train
  visualization_max_frames: 4
  visualization_max_side: 384
  amp: true
  checkpoint_out: outputs/checkpoints/3am_full.pt
